name: ZTD Password Manager CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  skip-check:
    name: Check if CI should run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      changed_files: ${{ steps.check.outputs.changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "changed_files=all" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "${{ github.event.head_commit.message }}" == docs:* ]] || \
             [[ "${{ github.event.head_commit.message }}" == chore:* ]] || \
             [[ "${{ github.event.head_commit.message }}" == ci:* ]]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "changed_files=none" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD)
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi

          echo "Changed files: $CHANGED_FILES"

          SKIP_DIRS="^\.agent\/|^docs\/|^\.github\/(?!workflows\/)|\.md$|^LICENSE$|^README"
          CODE_DIRS="^lib\/|^test\/|^android\/|^ios\/|^web\/|pubspec\.yaml|analysis_options\.yaml|\.github\/workflows\/"

          HAS_CODE=false
          HAS_SKIPPABLE=false

          for file in $CHANGED_FILES; do
            if echo "$file" | grep -qE "$CODE_DIRS"; then
              HAS_CODE=true
            fi
            if echo "$file" | grep -qE "$SKIP_DIRS"; then
              HAS_SKIPPABLE=true
            fi
          done

          if [ "$HAS_CODE" = "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "changed_files=code" >> $GITHUB_OUTPUT
          elif [ "$HAS_SKIPPABLE" = "true" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "changed_files=docs-only" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "changed_files=unknown" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Code Quality Check
    needs: skip-check
    if: needs.skip-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: |
          dart format --line-length 100 . 2>&1 | tee format-report.txt
          echo "FORMAT_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Analyze code
        run: |
          flutter analyze --no-fatal-infos 2>&1 | tee analyze-report.txt
          echo "ANALYZE_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Run tests
        run: |
          flutter test --no-pub 2>&1 | tee test-report.txt
          echo "TEST_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: |
            format-report.txt
            analyze-report.txt
            test-report.txt
          retention-days: 3

      - name: Report failures
        if: always()
        run: |
          FAILED=false
          if [ "$FORMAT_EXIT" != "0" ]; then
            echo "❌ Format check FAILED" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "✅ Format check passed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$ANALYZE_EXIT" != "0" ]; then
            echo "❌ Code analysis FAILED" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "✅ Code analysis passed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$TEST_EXIT" != "0" ]; then
            echo "❌ Tests FAILED" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "✅ Tests passed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "📥 Download the **ci-reports** artifact for detailed logs." >> $GITHUB_STEP_SUMMARY
          if [ "$FAILED" = "true" ]; then
            exit 1
          fi

  build-android:
    name: Build Android
    needs: skip-check
    if: needs.skip-check.outputs.should_run == 'true' && (github.event_name == 'workflow_dispatch' || needs.skip-check.outputs.changed_files == 'code')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Keystore
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        if: env.UPLOAD_KEYSTORE_BASE64 != ''
        run: echo "$UPLOAD_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Build Android APK
        run: flutter build apk --release
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_FILE_PATH: upload-keystore.jks

      - name: Build Android AppBundle
        run: flutter build appbundle --release
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_FILE_PATH: upload-keystore.jks

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Upload Android AppBundle
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

  build-web:
    name: Build Web
    needs: lint
    if: needs.skip-check.outputs.should_run == 'true' && (github.event_name == 'workflow_dispatch' || needs.skip-check.outputs.changed_files == 'code')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 7

      - name: Zip Web Build
        run: cd build/web && zip -r ../../web-release.zip .

  release:
    name: Create Release
    needs: [build-android, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: .

      - name: Download AppBundle
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
          path: .

      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web

      - name: Create Release ZIP
        run: cd web && zip -r ../web-release.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release.apk
            app-release.aab
            web-release.zip
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-summary:
    name: CI Summary
    needs: [lint, build-android, build-web]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: CI Status Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Android | ${{ needs.build-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Web | ${{ needs.build-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
